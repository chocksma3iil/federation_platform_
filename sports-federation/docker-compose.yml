version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: federation_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       federation_db
      POSTGRES_USER:     federation_user
      POSTGRES_PASSWORD: federation_pass
    ports:
      - "5432:5432"
    volumes:
      - federation_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U federation_user -d federation_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for local DB exploration
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: federation_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@federation.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools     # start only with: docker compose --profile tools up

volumes:
  federation_pgdata:
    driver: local
