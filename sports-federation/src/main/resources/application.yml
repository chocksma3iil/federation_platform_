spring:
  application:
    name: sports-federation

  # ===== DATABASE =====
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/federation_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:azerty990}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      pool-name: FederationHikariPool

  # ===== JPA =====
  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns DDL; Hibernate only validates
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          lob:
            non_contextual_creation: true

  # ===== FLYWAY =====
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  # ===== JACKSON =====
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

  # ===== SMTP =====
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

# ===== SERVER =====
server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
  servlet:
    context-path: /api

# ===== SECURITY / JWT =====
app:
  jwt:
    secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970" # Override in prod via env var
    expiration-ms: 86400000 # 24h
    refresh-expiration-ms: 604800000 # 7 days
  password-reset:
    base-url: ${APP_PASSWORD_RESET_BASE_URL:http://localhost:4200/auth/reset-password}
  mail:
    from: ${APP_MAIL_FROM:no-reply@sports-federation.local}
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
      - "http://localhost:4200"
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    max-age: 3600

# ===== ACTUATOR =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# ===== OPENAPI =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json

# ===== LOGGING =====
logging:
  level:
    root: INFO
    com.federation: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

ai:
  ollama:
    base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
    model: ${AI_OLLAMA_MODEL:gemma3:4b}
    keep-alive: ${AI_OLLAMA_KEEP_ALIVE:20m}
    max-history-messages: ${AI_OLLAMA_MAX_HISTORY_MESSAGES:8}
    max-message-chars: ${AI_OLLAMA_MAX_MESSAGE_CHARS:700}
    max-known-clubs: ${AI_OLLAMA_MAX_KNOWN_CLUBS:25}
    num-predict: ${AI_OLLAMA_NUM_PREDICT:180}
    num-ctx: ${AI_OLLAMA_NUM_CTX:1024}
    temperature: ${AI_OLLAMA_TEMPERATURE:0.1}
    connect-timeout-ms: ${AI_OLLAMA_CONNECT_TIMEOUT_MS:2000}
    response-timeout-ms: ${AI_OLLAMA_RESPONSE_TIMEOUT_MS:45000}
